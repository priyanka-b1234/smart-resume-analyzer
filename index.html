<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Resume Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f6f8;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .red {
      color: red;
      font-weight: bold;
    }

    .green {
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Smart Resume Analyzer</h1>

  <!-- Resume Upload -->
  <label>Upload Resume (PDF/DOCX)</label>
  <input type="file" id="resumeFile" />

  <!-- Job Description -->
  <label>Job Description</label>
  <textarea id="jobDesc" rows="8" placeholder="Paste job description here..."></textarea>

  <!-- Button -->
  <button onclick="analyzeResume()">Analyze Resume</button>

  <!-- Output -->
  <div id="output" class="result" style="display:none;"></div>
</div>

<script>
async function analyzeResume() {
  const fileInput = document.getElementById("resumeFile");
  const jd = document.getElementById("jobDesc").value;
  const output = document.getElementById("output");

  if (!fileInput.files[0]) {
    alert("Please upload a resume");
    return;
  }

  const formData = new FormData();
  formData.append("resume", fileInput.files[0]);
  formData.append("job_description", jd);

  try {
    const response = await fetch("http://127.0.0.1:8000/analyze", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    output.style.display = "block";

    output.innerHTML = `
      <h3>Match Score: <span class="green">${data.match_score}%</span></h3>

      <h4>Resume Skills</h4>
      <p>${data.resume_skills.join(", ")}</p>

      <h4>Job Skills</h4>
      <p>${data.job_skills.join(", ")}</p>

      <h4>Missing Skills</h4>
      <p class="red">${data.missing_skills.join(", ")}</p>
    `;

  } catch (err) {
    output.style.display = "block";
    output.innerHTML = "<p class='red'>Error connecting to backend</p>";
  }
}
</script>

</body>
</html>
